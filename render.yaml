services:
  # Backend FastAPI service
  - type: web
    name: data-analysis-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: E2B_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PORT
        value: "8000"

  # Frontend Next.js service
  - type: web
    name: data-analysis-frontend
    env: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    # Pass env vars as Docker build arguments
    dockerBuildArgs:
      - NEXT_PUBLIC_API_URL=https://data-analysis-backend-mni0.onrender.com
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://data-analysis-backend-mni0.onrender.com
      - key: PORT
        value: "3000"
