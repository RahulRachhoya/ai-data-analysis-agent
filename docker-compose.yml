version: \"3.8\"  
  
services:  
  backend:  
    build:  
      context: ./backend  
      dockerfile: Dockerfile  
    ports:  
      - \"8001:8000\"  
    env_file:  
      - ./backend/.env  
    volumes:  
      - ./datasets:/app/datasets  
    healthcheck:  
      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:8000/health\"]  
      interval: 30s  
      timeout: 10s  
      retries: 3  
  
  frontend:  
    build:  
      context: ./frontend  
      dockerfile: Dockerfile  
    ports:  
      - \"3000:3000\"  
    environment:  
      - NEXT_PUBLIC_API_URL=http://backend:8001  
    depends_on:  
      backend:  
        condition: service_healthy 
